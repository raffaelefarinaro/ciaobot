repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy static type check
        entry: mypy ciao
        language: system
        types: [python]
        pass_filenames: false

      - id: eslint
        name: eslint frontend check
        entry: npm --prefix web run lint
        language: system
        files: ^web/src/.*\.(ts|vue)$
        pass_filenames: false
