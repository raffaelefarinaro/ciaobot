name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing
      contents: write   # upload artifacts to the GitHub release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build PWA
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Build wheel and sdist
        run: |
          python -m pip install --quiet build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Attach artifacts to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Compute wheel checksum
        id: wheel
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          version="${VERSION#v}"
          wheel_url="https://github.com/raffaelefarinaro/ciaobot/releases/download/v${version}/ciaobot-${version}-py3-none-any.whl"
          sha256="$(curl -fsSL "$wheel_url" | sha256sum | awk '{print $1}')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: raffaelefarinaro/homebrew-ciaobot
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-ciaobot
      - name: Update formula
        run: |
          ./scripts/update-homebrew-tap.sh \
            "${{ steps.wheel.outputs.version }}" \
            "${{ steps.wheel.outputs.sha256 }}" \
            homebrew-ciaobot
      - name: Commit and push tap update
        working-directory: homebrew-ciaobot
        env:
          RELEASE_VERSION: ${{ steps.wheel.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ciaobot.rb
          git commit -m "ciaobot ${RELEASE_VERSION}"
          git push
